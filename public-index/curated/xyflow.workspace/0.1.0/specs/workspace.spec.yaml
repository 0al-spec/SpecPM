apiVersion: specpm.dev/v0.1
kind: BoundarySpec
metadata:
  id: xyflow.workspace
  title: Xyflow Workspace Package-Set Boundary
  version: 0.1.0
  status: accepted
  authors:
    - name: SpecPM Maintainers
intent:
  summary: Describe the xyflow monorepo as an aggregate package-set entrypoint that contains React Flow, Svelte Flow, and the shared system package.
scope:
  boundedContext: xyflow-workspace
  includes:
    - Identify the xyflow repository as a package-set entrypoint for discoverability.
    - Relate the workspace entrypoint to reviewed member packages through accepted contains relations.
    - Preserve the upstream source revision and producer-generated candidate as review evidence.
  excludes:
    - Upstream maintainer endorsement.
    - Runtime behavior, package installation, package execution, or dependency solving.
    - Automatic acceptance of producer output, AI enrichment, or unreviewed generated claims.
provides:
  capabilities:
    - id: xyflow.workspace.package_set
      role: primary
      summary: Aggregate discovery entrypoint for the xyflow monorepo package family.
      intentIds:
        - intent.repository.package_workspace
        - intent.ui.flow_diagramming
        - intent.ui.node_based_editor
requires:
  capabilities: []
interfaces:
  inbound:
    - id: package_set.xyflow
      kind: schema
      summary: Registry metadata entrypoint that links xyflow workspace membership through accepted package relations.
      outputs:
        - name: package_set_members
          mediaTypes:
            - application/json
  outbound: []
effects:
  sideEffects: []
constraints:
  - id: maintainer_curated_acceptance
    level: MUST
    statement: This package-set entry is accepted as maintainer-curated registry metadata, not as direct producer output.
  - id: producer_output_not_authority
    level: MUST
    statement: SpecHarvester receipts and generated candidates are evidence only and do not grant registry acceptance by themselves.
evidence:
  - id: maintainer_review
    kind: manual_assertion
    supports:
      - intent.summary
      - scope
      - provides.capabilities
      - provides.capabilities.xyflow.workspace.package_set
      - interfaces.inbound
      - interfaces.inbound.package_set.xyflow
      - constraints
  - id: producer_candidate
    kind: foreign_spec
    supports:
      - foreignArtifacts
      - provenance
provenance:
  sourceConfidence:
    intent: high
    boundary: high
    behavior: low
  curatedBy: SpecPM maintainer review
  basedOnProducerCandidate: "repo:public-index/generated/xyflow.workspace/0.1.0"
  sourceRepository: "https://github.com/xyflow/xyflow"
  sourceRevision: a58568f11bc0e1a1bdca1b3549e959e2e1ca0cdd
  sourceTarget:
    kind: repository
    label: workspace
    path: "."
foreignArtifacts:
  - id: upstream_repository
    role: primary_intent_source
    uri: "https://github.com/xyflow/xyflow"
    revision: a58568f11bc0e1a1bdca1b3549e959e2e1ca0cdd
  - id: specharvester_candidate
    role: documentation
    uri: "repo:public-index/generated/xyflow.workspace/0.1.0/specpm.yaml"
  - id: specharvester_producer_receipt
    role: documentation
    uri: "repo:public-index/generated/xyflow.workspace/0.1.0/producer-receipt.json"
keywords:
  - curated
  - package set
  - xyflow
  - workspace
