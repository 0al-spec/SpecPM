apiVersion: specpm.dev/v0.1
kind: SpecPackage
metadata:
  id: xyflow.svelte
  name: Xyflow Svelte
  version: 0.1.0
  summary: Maintainer-curated SpecPackage for Svelte Flow, the xyflow Svelte library for node-based editors, workflows, and diagrams.
  license: MIT
  licenseEvidence:
    source: manifest
    confidence: high
    paths:
      - packages/svelte/package.json
  authors:
    - name: SpecPM Maintainers
specs:
  - path: specs/svelte.spec.yaml
index:
  provides:
    capabilities:
      - xyflow.svelte.flow_canvas
    intents:
      - intent.javascript.svelte_library
      - intent.package.javascript_library
      - intent.ui.diagramming
      - intent.ui.flow_diagramming
      - intent.ui.node_based_editor
  requires:
    capabilities: []
compatibility:
  platforms:
    - web
    - node
  languages:
    - javascript
foreignArtifacts:
  - id: upstream_repository
    role: primary_intent_source
    uri: "https://github.com/xyflow/xyflow"
    revision: a58568f11bc0e1a1bdca1b3549e959e2e1ca0cdd
  - id: specharvester_candidate
    role: documentation
    uri: "repo:public-index/generated/xyflow.svelte/0.1.0/specpm.yaml"
  - id: specharvester_producer_receipt
    role: documentation
    uri: "repo:public-index/generated/xyflow.svelte/0.1.0/producer-receipt.json"
  - id: specharvester_validation_report
    role: documentation
    uri: "repo:public-index/generated/xyflow.svelte/0.1.0/validation-report.json"
keywords:
  - curated
  - svelte
  - svelte flow
  - xyflow
