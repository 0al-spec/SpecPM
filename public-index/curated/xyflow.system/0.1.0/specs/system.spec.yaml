apiVersion: specpm.dev/v0.1
kind: BoundarySpec
metadata:
  id: xyflow.system
  title: Xyflow System Utilities Boundary
  version: 0.1.0
  status: accepted
  authors:
    - name: SpecPM Maintainers
intent:
  summary: Describe @xyflow/system as the shared package of graph, geometry, pan/zoom, drag, resize, and flow utility primitives used by React Flow and Svelte Flow.
scope:
  boundedContext: xyflow-system
  includes:
    - Identify the shared system package boundary from the xyflow workspace.
    - Describe reusable flow-canvas utilities evidenced by package metadata and public source entrypoints.
    - Preserve producer-generated evidence without treating it as registry authority.
  excludes:
    - Upstream maintainer endorsement.
    - Runtime behavior beyond statically reviewed package metadata and public source evidence.
    - Automatic acceptance of AI-enriched summaries, capabilities, or interface claims.
provides:
  capabilities:
    - id: xyflow.system.flow_system_utilities
      role: primary
      summary: Shared utilities for xyflow graph state, geometry, pan/zoom, drag, resize, and flow-canvas interactions.
      intentIds:
        - intent.javascript.react_library
        - intent.javascript.svelte_library
        - intent.package.javascript_library
        - intent.ui.flow_system_utilities
requires:
  capabilities: []
interfaces:
  inbound:
    - id: package.system
      kind: library
      summary: Public package surface for @xyflow/system.
      outputs:
        - name: package_manifest
          mediaTypes:
            - application/json
        - name: package_exports
          mediaTypes:
            - application/javascript
  outbound: []
effects:
  sideEffects: []
constraints:
  - id: maintainer_curated_acceptance
    level: MUST
    statement: This package is accepted as maintainer-curated registry metadata, not as direct producer output.
  - id: producer_output_not_authority
    level: MUST
    statement: SpecHarvester receipts and generated candidates are evidence only and do not grant registry acceptance by themselves.
evidence:
  - id: maintainer_review
    kind: manual_assertion
    supports:
      - intent.summary
      - scope
      - provides.capabilities
      - provides.capabilities.xyflow.system.flow_system_utilities
      - interfaces.inbound
      - interfaces.inbound.package.system
      - constraints
  - id: producer_candidate
    kind: foreign_spec
    supports:
      - foreignArtifacts
      - provenance
provenance:
  sourceConfidence:
    intent: high
    boundary: high
    behavior: low
  curatedBy: SpecPM maintainer review
