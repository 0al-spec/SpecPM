name: Producer Bundle Preflight

"on":
  pull_request:

permissions:
  contents: read

jobs:
  producer-bundle-preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Write pull request body
        id: proposal
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          body = os.environ.get("PR_BODY") or ""
          body_path = Path(os.environ["RUNNER_TEMP"]) / "producer-bundle-pr-body.md"
          body_path.write_text(body, encoding="utf-8")
          payloads = []
          for match in re.finditer(r"```json\s*(.*?)```", body, re.DOTALL | re.IGNORECASE):
              try:
                  payloads.append(json.loads(match.group(1)))
              except json.JSONDecodeError:
                  pass
          has_links = any(
              isinstance(payload, dict)
              and isinstance(payload.get("producerEvidenceLinks"), list)
              for payload in payloads
          )
          has_decision = any(
              isinstance(payload, dict)
              and isinstance(payload.get("registryAcceptanceDecision"), dict)
              for payload in payloads
          )
          should_run = has_links and has_decision
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"should_run={'true' if should_run else 'false'}\n")
              output.write(f"body_path={body_path}\n")
          PY

      - name: Skip non-producer proposal
        if: steps.proposal.outputs.should_run != 'true'
        run: echo "No producerEvidenceLinks and registryAcceptanceDecision blocks found."

      - name: Check out pull request
        if: steps.proposal.outputs.should_run == 'true'
        uses: actions/checkout@v6

      - name: Set up Python
        if: steps.proposal.outputs.should_run == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install SpecPM
        if: steps.proposal.outputs.should_run == 'true'
        run: python -m pip install -e ".[dev]"

      - name: Preflight producer bundle evidence
        if: steps.proposal.outputs.should_run == 'true'
        run: |
          python -m specpm.cli producer-bundle preflight \
            --body "${{ steps.proposal.outputs.body_path }}" \
            --root "$GITHUB_WORKSPACE" \
            --json
