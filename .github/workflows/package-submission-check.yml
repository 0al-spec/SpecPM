name: Package Submission Check

"on":
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  validate-submission:
    if: contains(github.event.issue.labels.*.name, 'package-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Check out SpecPM
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SpecPM
        run: python -m pip install -e ".[dev]"

      - name: Write issue body
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          Path("submission-issue.md").write_text(os.environ["ISSUE_BODY"], encoding="utf-8")
          PY

      - name: Validate submitted packages
        id: validate
        run: |
          set +e
          python scripts/validate_index_submission.py \
            --issue-body-file submission-issue.md \
            --json-output submission-report.json \
            --markdown-output submission-report.md
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Comment validation report
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- package-submission-validation-report -->";
            const report = fs.readFileSync("submission-report.md", "utf8");
            const body = `${marker}\n${report}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existingComment = comments.find((comment) =>
              typeof comment.body === "string" && comment.body.includes(marker)
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

      - name: Fail invalid submissions
        if: steps.validate.outputs.status != '0'
        run: exit 1
