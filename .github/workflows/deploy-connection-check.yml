name: Deploy Connection Check

on:
  pull_request_target:
    paths:
      - ".github/workflows/deploy-connection-check.yml"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: specpm-deploy-connection-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy-connection-check:
    name: Check SpecPM.dev SFTP connection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.pull_request.head.repo.full_name == github.repository
    environment:
      name: FTP
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}
      FTP_REMOTE_ROOT: ${{ secrets.FTP_REMOTE_ROOT }}

    steps:
      - name: Checkout trusted workflow
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Validate deploy settings
        run: |
          test -n "$FTP_HOST"
          test -n "$FTP_USER"
          test -n "$FTP_PASS"
          test -n "$FTP_REMOTE_ROOT"
          if [ "$FTP_REMOTE_ROOT" = "/" ]; then
            echo "FTP_REMOTE_ROOT must not be /" >&2
            exit 2
          fi

      - name: Install transfer client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openssh-client

      - name: Prepare SFTP known hosts
        run: |
          DEPLOY_PORT="${FTP_PORT:-22}"
          mkdir -p "$HOME/.ssh"
          ssh-keyscan -T 20 -p "$DEPLOY_PORT" "$FTP_HOST" > "$HOME/.ssh/known_hosts"

      - name: Check SFTP connection without upload
        timeout-minutes: 3
        run: |
          DEPLOY_PORT="${FTP_PORT:-22}"
          timeout --kill-after=30s 2m lftp -u "$FTP_USER,$FTP_PASS" "sftp://$FTP_HOST:$DEPLOY_PORT" <<EOF
          set cmd:fail-exit yes
          set sftp:connect-program "ssh -a -x -o ServerAliveInterval=15 -o ServerAliveCountMax=2 -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 1
          set net:timeout 20
          set net:reconnect-interval-base 5
          cls -1 "$FTP_REMOTE_ROOT"
          bye
          EOF
