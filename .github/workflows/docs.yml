name: Deploy DocC Documentation

on:
  push:
    branches:
      - main
    paths:
      - "Package.swift"
      - "Package.resolved"
      - "Makefile"
      - "pyproject.toml"
      - "specpm.yaml"
      - "src/specpm/**"
      - "examples/**"
      - "public-index/**"
      - "landing_page/**"
      - "Sources/SpecPM/**"
      - "Sources/SpecPM-docs/**"
      - "README.md"
      - "specs/**"
      - "RFC/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Package.swift"
      - "Package.resolved"
      - "Makefile"
      - "pyproject.toml"
      - "specpm.yaml"
      - "src/specpm/**"
      - "examples/**"
      - "public-index/**"
      - "landing_page/**"
      - "Sources/SpecPM/**"
      - "Sources/SpecPM-docs/**"
      - "README.md"
      - "specs/**"
      - "RFC/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SpecPM
        run: python -m pip install -e ".[dev]"

      - name: Build Documentation
        run: |
          swift package --allow-writing-to-directory ./.docc-build \
            generate-documentation \
            --target SpecPM \
            --output-path ./.docc-build \
            --transform-for-static-hosting \
            --hosting-base-path SpecPM

      - name: Generate public index metadata
        env:
          SPECPM_PUBLIC_INDEX_REGISTRY_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          python -m specpm.cli public-index generate \
            --manifest public-index/accepted-packages.yml \
            --output ./.docc-build \
            --registry "$SPECPM_PUBLIC_INDEX_REGISTRY_URL" \
            --json

      - name: Copy registry viewer
        run: |
          mkdir -p ./.docc-build/viewer
          cp landing_page/viewer.html ./.docc-build/viewer/index.html

      - name: Add .nojekyll and index.html redirect
        run: |
          touch .docc-build/.nojekyll
          cat > .docc-build/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting to SpecPM Documentation</title>
            <meta http-equiv="refresh" content="0; url=./documentation/specpm/">
            <link rel="canonical" href="./documentation/specpm/">
          </head>
          <body>
            <p>Redirecting to <a href="./documentation/specpm/">SpecPM Documentation</a>...</p>
            <script>
              window.location.href = "./documentation/specpm/";
            </script>
          </body>
          </html>
          EOF

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./.docc-build"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
