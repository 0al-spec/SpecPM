name: Deploy DocC Documentation

on:
  push:
    branches:
      - main
    paths:
      - "Package.swift"
      - "Package.resolved"
      - "Makefile"
      - "pyproject.toml"
      - "specpm.yaml"
      - "src/specpm/**"
      - "examples/**"
      - "public-index/**"
      - "landing_page/**"
      - "scripts/render_pages.py"
      - "Sources/SpecPM/**"
      - "Sources/SpecPM-docs/**"
      - "README.md"
      - "specs/**"
      - "RFC/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Package.swift"
      - "Package.resolved"
      - "Makefile"
      - "pyproject.toml"
      - "specpm.yaml"
      - "src/specpm/**"
      - "examples/**"
      - "public-index/**"
      - "landing_page/**"
      - "scripts/render_pages.py"
      - "Sources/SpecPM/**"
      - "Sources/SpecPM-docs/**"
      - "README.md"
      - "specs/**"
      - "RFC/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install SpecPM
        run: python -m pip install -e ".[dev]"

      - name: Build Documentation
        run: |
          swift package --allow-writing-to-directory ./.docc-build \
            generate-documentation \
            --target SpecPM \
            --output-path ./.docc-build \
            --transform-for-static-hosting \
            --hosting-base-path SpecPM

      - name: Generate public index metadata
        env:
          SPECPM_PUBLIC_INDEX_REGISTRY_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          SPECPM_VERSION="$(python -c 'from specpm import __version__; print(__version__)')"
          python -m specpm.cli public-index generate \
            --manifest public-index/accepted-packages.yml \
            --output ./.docc-build \
            --registry "$SPECPM_PUBLIC_INDEX_REGISTRY_URL" \
            --specpm-version "$SPECPM_VERSION" \
            --build-number "${{ github.run_number }}" \
            --build-revision "${{ github.sha }}" \
            --json

      - name: Render GitHub Pages root redirect and viewer
        run: |
          SPECPM_VERSION="$(python -c 'from specpm import __version__; print(__version__)')"
          python scripts/render_pages.py \
            --output ./.docc-build \
            --specpm-version "$SPECPM_VERSION" \
            --build-number "${{ github.run_number }}" \
            --build-revision "${{ github.sha }}" \
            --root-mode docs-redirect \
            --docs-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/documentation/specpm/"

      - name: Prepare SpecPM.dev static host artifact
        run: |
          rm -rf ./.static-host-build
          cp -R ./.docc-build ./.static-host-build
          SPECPM_VERSION="$(python -c 'from specpm import __version__; print(__version__)')"
          python scripts/render_pages.py \
            --output ./.static-host-build \
            --specpm-version "$SPECPM_VERSION" \
            --build-number "${{ github.run_number }}" \
            --build-revision "${{ github.sha }}"

      - name: Upload static host artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: specpm-static-site
          path: "./.static-host-build"
          if-no-files-found: error
          include-hidden-files: true

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./.docc-build"

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  deploy-static-host:
    name: Deploy SpecPM.dev static host
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: FTP
      url: https://SpecPM.dev
    env:
      FTP_HOST: ${{ secrets.FTP_HOST }}
      FTP_PORT: ${{ secrets.FTP_PORT }}
      FTP_USER: ${{ secrets.FTP_USER }}
      FTP_PASS: ${{ secrets.FTP_PASS }}
      FTP_REMOTE_ROOT: ${{ secrets.FTP_REMOTE_ROOT }}

    steps:
      - name: Download static host artifact
        uses: actions/download-artifact@v8
        with:
          name: specpm-static-site
          path: specpm-static-site

      - name: Validate static host artifact
        run: |
          test -f specpm-static-site/index.html
          test -f specpm-static-site/theme-settings.json
          test -f specpm-static-site/viewer/index.html
          test -f specpm-static-site/v0/status/index.json

      - name: Summarize static host artifact
        run: |
          find specpm-static-site -type f | sort > /tmp/specpm-static-site-files.txt
          printf 'Static host file count: '
          wc -l < /tmp/specpm-static-site-files.txt
          printf 'Static host byte size: '
          du -sb specpm-static-site | awk '{ print $1 }'
          printf 'Static host human size: '
          du -sh specpm-static-site | awk '{ print $1 }'
          echo "Largest static host files:"
          find specpm-static-site -type f -printf '%s %p\n' | sort -nr > /tmp/specpm-static-site-largest-files.txt
          head -20 /tmp/specpm-static-site-largest-files.txt

      - name: Validate deploy settings
        run: |
          test -n "$FTP_HOST"
          test -n "$FTP_USER"
          test -n "$FTP_PASS"
          test -n "$FTP_REMOTE_ROOT"
          if [ "$FTP_REMOTE_ROOT" = "/" ]; then
            echo "FTP_REMOTE_ROOT must not be /" >&2
            exit 2
          fi

      - name: Install transfer client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openssh-client

      - name: Prepare SFTP known hosts
        run: |
          DEPLOY_PORT="${FTP_PORT:-22}"
          mkdir -p "$HOME/.ssh"
          : > "$HOME/.ssh/known_hosts"
          for attempt in 1 2 3; do
            if ssh-keyscan -T 20 -p "$DEPLOY_PORT" "$FTP_HOST" >> "$HOME/.ssh/known_hosts"; then
              break
            fi
            echo "ssh-keyscan attempt $attempt failed; retrying." >&2
            sleep 5
          done
          test -s "$HOME/.ssh/known_hosts"

      - name: Check SpecPM.dev SFTP target
        timeout-minutes: 3
        run: |
          DEPLOY_PORT="${FTP_PORT:-22}"
          timeout --kill-after=30s 2m lftp -u "$FTP_USER,$FTP_PASS" "sftp://$FTP_HOST:$DEPLOY_PORT" <<EOF
          set cmd:fail-exit yes
          set sftp:connect-program "ssh -a -x -o ServerAliveInterval=15 -o ServerAliveCountMax=2 -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 1
          set net:timeout 20
          set net:reconnect-interval-base 5
          cls -1 "$FTP_REMOTE_ROOT"
          bye
          EOF

      - name: Upload to SpecPM.dev over SFTP
        timeout-minutes: 25
        run: |
          DEPLOY_PORT="${FTP_PORT:-22}"
          UPLOAD_STARTED_AT="$(date +%s)"
          TRANSFER_LOG="/tmp/specpm-lftp-transfer.log"
          FILE_COUNT="$(find specpm-static-site -type f | wc -l)"
          BYTE_SIZE="$(du -sb specpm-static-site | awk '{ print $1 }')"
          echo "Uploading $FILE_COUNT files ($BYTE_SIZE bytes) to SpecPM.dev over SFTP."
          echo "::group::SFTP upload"
          set +e
          timeout --kill-after=30s 18m lftp -u "$FTP_USER,$FTP_PASS" "sftp://$FTP_HOST:$DEPLOY_PORT" <<EOF
          set cmd:fail-exit yes
          set cmd:trace yes
          set sftp:connect-program "ssh -a -x -o ServerAliveInterval=15 -o ServerAliveCountMax=2 -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 1
          set net:timeout 20
          set net:reconnect-interval-base 5
          set xfer:log yes
          set xfer:log-file "$TRANSFER_LOG"
          lcd specpm-static-site
          mirror -R --verbose=2 --exclude-glob .DS_Store . "$FTP_REMOTE_ROOT"
          bye
          EOF
          UPLOAD_STATUS="$?"
          set -e
          UPLOAD_FINISHED_AT="$(date +%s)"
          echo "SFTP upload exited with status $UPLOAD_STATUS after $((UPLOAD_FINISHED_AT - UPLOAD_STARTED_AT)) seconds."
          if [ -s "$TRANSFER_LOG" ]; then
            echo "Recent lftp transfer log entries:"
            tail -40 "$TRANSFER_LOG"
          fi
          echo "::endgroup::"
          exit "$UPLOAD_STATUS"
