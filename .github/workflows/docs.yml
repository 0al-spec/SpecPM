name: Deploy DocC Documentation

on:
  push:
    branches:
      - main
    paths:
      - "Package.swift"
      - "Package.resolved"
      - "Makefile"
      - "pyproject.toml"
      - "specpm.yaml"
      - "src/specpm/**"
      - "examples/**"
      - "public-index/**"
      - "landing_page/**"
      - "scripts/render_pages.py"
      - "Sources/SpecPM/**"
      - "Sources/SpecPM-docs/**"
      - "README.md"
      - "specs/**"
      - "RFC/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches:
      - main
    paths:
      - "Package.swift"
      - "Package.resolved"
      - "Makefile"
      - "pyproject.toml"
      - "specpm.yaml"
      - "src/specpm/**"
      - "examples/**"
      - "public-index/**"
      - "landing_page/**"
      - "scripts/render_pages.py"
      - "Sources/SpecPM/**"
      - "Sources/SpecPM-docs/**"
      - "README.md"
      - "specs/**"
      - "RFC/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SpecPM
        run: python -m pip install -e ".[dev]"

      - name: Build Documentation
        run: |
          swift package --allow-writing-to-directory ./.docc-build \
            generate-documentation \
            --target SpecPM \
            --output-path ./.docc-build \
            --transform-for-static-hosting \
            --hosting-base-path SpecPM

      - name: Generate public index metadata
        env:
          SPECPM_PUBLIC_INDEX_REGISTRY_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          SPECPM_VERSION="$(python -c 'from specpm import __version__; print(__version__)')"
          python -m specpm.cli public-index generate \
            --manifest public-index/accepted-packages.yml \
            --output ./.docc-build \
            --registry "$SPECPM_PUBLIC_INDEX_REGISTRY_URL" \
            --specpm-version "$SPECPM_VERSION" \
            --build-number "${{ github.run_number }}" \
            --build-revision "${{ github.sha }}" \
            --json

      - name: Render landing and viewer
        run: |
          SPECPM_VERSION="$(python -c 'from specpm import __version__; print(__version__)')"
          python scripts/render_pages.py \
            --output ./.docc-build \
            --specpm-version "$SPECPM_VERSION" \
            --build-number "${{ github.run_number }}" \
            --build-revision "${{ github.sha }}"

      - name: Upload artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./.docc-build"

      - name: Upload static host artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: specpm-static-site
          path: "./.docc-build"
          if-no-files-found: error

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-static-host:
    name: Deploy SpecPM.dev static host
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: FTP
      url: https://SpecPM.dev
    env:
      FTP_HOST: server209.hosting.reg.ru
      FTP_PORT: "22"
      FTP_USER: u1660092
      FTP_PASS: ${{ secrets.FTP_PASS }}
      FTP_REMOTE_ROOT: /var/www/u1660092/data/www/specpm.dev

    steps:
      - name: Download static host artifact
        uses: actions/download-artifact@v4
        with:
          name: specpm-static-site
          path: specpm-static-site

      - name: Validate static host artifact
        run: |
          test -f specpm-static-site/index.html
          test -f specpm-static-site/viewer/index.html
          test -f specpm-static-site/v0/status/index.json

      - name: Install transfer client
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp openssh-client

      - name: Upload to SpecPM.dev over SFTP
        run: |
          test -n "$FTP_HOST"
          test -n "$FTP_PORT"
          test -n "$FTP_USER"
          test -n "$FTP_PASS"
          test -n "$FTP_REMOTE_ROOT"
          if [ "$FTP_REMOTE_ROOT" = "/" ]; then
            echo "FTP_REMOTE_ROOT must not be /" >&2
            exit 2
          fi

          mkdir -p "$HOME/.ssh"
          ssh-keyscan -p "$FTP_PORT" "$FTP_HOST" > "$HOME/.ssh/known_hosts"

          lftp -u "$FTP_USER,$FTP_PASS" "sftp://$FTP_HOST:$FTP_PORT" <<EOF
          set sftp:connect-program "ssh -a -x -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          set net:max-retries 2
          set net:timeout 30
          lcd specpm-static-site
          mirror -R --verbose --exclude-glob .DS_Store . "$FTP_REMOTE_ROOT"
          bye
          EOF
