name: Namespace Claim Decision Report

"on":
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  issues: write

jobs:
  report-namespace-claim-decision:
    if: contains(github.event.issue.labels.*.name, 'namespace-claim')
    runs-on: ubuntu-latest
    steps:
      - name: Report namespace claim decision label
        uses: actions/github-script@v7
        with:
          script: |
            const policyPath = "specs/NAMESPACE_CLAIM_POLICY.md";
            const marker = "<!-- namespace-claim-decision-report -->";
            const decisionLabels = [
              "namespace:accepted",
              "namespace:rejected",
              "namespace:contested",
              "namespace:superseded"
            ];
            const labelDescriptions = {
              "namespace:accepted": "Maintainers accepted this claim as public-index review evidence.",
              "namespace:rejected": "Maintainers rejected this claim for the public index.",
              "namespace:contested": "Maintainers marked this claim as contested and under dispute review.",
              "namespace:superseded": "Maintainers marked this claim as replaced by a newer issue or decision."
            };

            const currentLabels = (context.payload.issue.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const activeDecisionLabels = decisionLabels.filter((label) => currentLabels.includes(label));

            const { data: repository } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const policyUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/${repository.default_branch}/${policyPath}`;

            let existingComment;
            let page = 1;

            while (!existingComment) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
                page
              });

              existingComment = comments.find((comment) =>
                comment.user?.login === "github-actions[bot]" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
              );

              if (existingComment || comments.length < 100) {
                break;
              }

              page += 1;
            }

            if (activeDecisionLabels.length === 0 && !existingComment) {
              core.info("No namespace claim decision label is present; no report is needed.");
              return;
            }

            let body;
            if (activeDecisionLabels.length === 0) {
              body = [
                marker,
                "Namespace claim decision report.",
                "",
                "No namespace claim decision label is currently present.",
                "",
                `Review context: [Public Index Namespace Claim Policy](${policyUrl}).`,
                "",
                "This report records maintainer-applied issue labels. It does not apply terminal decision labels by itself, grant namespace ownership, approve packages, mutate the registry, edit `public-index/accepted-packages.yml`, publish packages, install packages, or execute package content."
              ].join("\n");
            } else if (activeDecisionLabels.length > 1) {
              body = [
                marker,
                "Namespace claim decision report.",
                "",
                `Multiple maintainer-applied decision labels are present: ${activeDecisionLabels.map((label) => `\`${label}\``).join(", ")}.`,
                "",
                "Maintainers should keep exactly one terminal namespace decision label before using this report as decision evidence.",
                "",
                `Review context: [Public Index Namespace Claim Policy](${policyUrl}).`,
                "",
                "This report records maintainer-applied issue labels. It does not apply terminal decision labels by itself, grant namespace ownership, approve packages, mutate the registry, edit `public-index/accepted-packages.yml`, publish packages, install packages, or execute package content."
              ].join("\n");
            } else {
              const activeDecision = activeDecisionLabels[0];
              body = [
                marker,
                "Namespace claim decision report.",
                "",
                `Current maintainer-applied decision label: \`${activeDecision}\`.`,
                "",
                labelDescriptions[activeDecision],
                "",
                `Review context: [Public Index Namespace Claim Policy](${policyUrl}).`,
                "",
                "This report records a maintainer-applied issue label. It does not apply terminal decision labels by itself, grant namespace ownership, approve packages, mutate the registry, edit `public-index/accepted-packages.yml`, publish packages, install packages, or execute package content."
              ].join("\n");
            }

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
