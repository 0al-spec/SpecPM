name: Package Submission Triage

"on":
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: read
  issues: write

jobs:
  triage-submission:
    if: contains(github.event.issue.labels.*.name, 'package-submission')
    runs-on: ubuntu-latest
    steps:
      - name: Prepare package submission review labels
        uses: actions/github-script@v9
        with:
          script: |
            const reviewLabels = [
              "package:needs-fix",
              "package:under-review",
              "package:validated",
              "package:accepted",
              "package:rejected",
              "package:blocked",
              "package:duplicate"
            ];

            const labelDefinitions = {
              "package:needs-fix": {
                color: "d73a4a",
                description: "Package submission needs author changes before acceptance review."
              },
              "package:under-review": {
                color: "fbca04",
                description: "Package submission is ready for maintainer review."
              },
              "package:validated": {
                color: "0e8a16",
                description: "Package submission validation passed and has reviewable evidence."
              },
              "package:accepted": {
                color: "0e8a16",
                description: "Package submission accepted through reviewed public-index PR."
              },
              "package:rejected": {
                color: "b60205",
                description: "Package submission rejected for the public index."
              },
              "package:blocked": {
                color: "5319e7",
                description: "Package submission review is blocked by policy or ownership questions."
              },
              "package:duplicate": {
                color: "cfd3d7",
                description: "Package submission duplicates an accepted source or open review."
              }
            };

            async function ensureLabel(name, definition) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color: definition.color,
                  description: definition.description
                }).catch((createError) => {
                  if (createError.status !== 422) {
                    throw createError;
                  }
                });
              }
            }

            for (const [name, definition] of Object.entries(labelDefinitions)) {
              await ensureLabel(name, definition);
            }

            const currentLabels = (context.payload.issue.labels || []).map((label) =>
              typeof label === "string" ? label : label.name
            );
            const hasReviewLabel = currentLabels.some((label) => reviewLabels.includes(label));

            if (!hasReviewLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: ["package:under-review"]
              });
            }

            const marker = "<!-- package-submission-triage -->";
            const guidePath = "specs/PUBLIC_INDEX_OPERATOR_GUIDE.md";
            const { data: repository } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo
            });
            const guideUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/blob/${repository.default_branch}/${guidePath}`;
            const body = [
              marker,
              "## Package Submission Review",
              "",
              `Maintainers should review this issue using [Public Index Operator Guide](${guideUrl}).`,
              "",
              "This automation only prepares review labels and keeps this note current. It does not decide acceptance, edit `public-index/accepted-packages.yml`, generate registry metadata, publish packages, install packages, or execute package content."
            ].join("\n");

            let existingComment;
            let page = 1;

            while (!existingComment) {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                per_page: 100,
                page
              });

              existingComment = comments.find((comment) =>
                comment.user?.login === "github-actions[bot]" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
              );

              if (existingComment || comments.length < 100) {
                break;
              }

              page += 1;
            }

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
