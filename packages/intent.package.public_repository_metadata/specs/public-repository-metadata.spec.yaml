apiVersion: specpm.dev/v0.1
kind: BoundarySpec
metadata:
  id: intent.package.public_repository_metadata.contract
  title: Public Repository Metadata Abstract Contract
  version: 0.1.0
  status: draft
  authors:
    - name: 0AL Spec
    - name: Egor Merkushev
intent:
  summary: Define an intent-level interface contract for packages that expose static public repository metadata as reusable specification intent.
scope:
  boundedContext: public_repository_metadata_contract
  includes:
    - Define a reusable boundary for static public repository metadata.
    - Describe repository identity, package manifests, README/LICENSE provenance, static public API surfaces, and reviewable metadata summaries when present.
    - Provide a dependency-inversion target that architecture nodes can reference before choosing a concrete repository metadata provider.
    - Provide seed metadata for exact capability lookup, exact intent lookup, authoring assistance, duplicate detection, and downstream graph relationships.
    - Allow concrete packages to claim conformance by supplying reviewed evidence for observed public repository metadata.
  excludes:
    - Claiming upstream maintainer endorsement.
    - Describing runtime behavior that is not evidenced by static repository metadata.
    - Selecting a concrete provider package or asserting conformance without reviewed evidence.
    - Installing dependencies, running package scripts, building packages, running tests, or probing networks.
    - Treating observed intent IDs as canonical semantic authority.
    - Deciding downstream graph relationships, semantic meaning, refinement, or proposal lanes.
provides:
  capabilities:
    - id: intent.package.public_repository_metadata.contract
      role: primary
      summary: Intent-level interface contract for static public repository metadata packages.
      intentIds:
        - intent.package.public_repository_metadata
requires:
  capabilities: []
interfaces:
  inbound:
    - id: repository_metadata_evidence
      kind: schema
      summary: Reviewable static repository metadata evidence supplied by concrete packages.
      inputs:
        - name: repository_metadata
          mediaTypes:
            - application/json
            - text/markdown
            - application/yaml
      outputs:
        - name: conformance_claim
          mediaTypes:
            - application/yaml
  outbound: []
effects:
  sideEffects: []
constraints:
  - id: no_implementation_claim
    level: MUST
    statement: This intent-level contract must not be treated as evidence that an implementation exists.
  - id: concrete_conformance_requires_evidence
    level: MUST
    statement: A concrete provider package claiming this contract must supply repository evidence for every implementation or conformance claim it makes.
  - id: no_package_execution
    level: MUST
    statement: Conformance to this contract must not require executing package scripts, prompts, tests, builds, installs, or network probes.
  - id: provider_selection_is_downstream
    level: MUST
    statement: Selecting GitHub, GitLab, SourceForge, Gitea, or another concrete provider is downstream governance work, not a decision made by this package.
  - id: downstream_governance_decides_relationships
    level: SHOULD
    statement: Downstream graph governance should decide relationships such as implements, conforms_to, satisfies, refines, and supersedes.
evidence:
  - id: abstract_contract_rationale
    kind: documentation
    path: evidence/README.md
    supports:
      - intent.summary
      - scope
      - provides.capabilities.intent.package.public_repository_metadata.contract
      - constraints
      - provenance
provenance:
  sourceConfidence:
    intent: medium
    boundary: medium
    behavior: unknown
implementationBindings: []
keywords:
  - abstract
  - conformance-target
  - dependency-inversion
  - intent-interface
  - public-repository-metadata
