apiVersion: specpm.dev/v0.1
kind: BoundarySpec
metadata:
  id: specpm.core
  title: SpecPM Core Package Manager
  version: 0.1.0
  status: draft
  authors:
    - name: 0AL Spec
    - name: Egor Merkushev
intent:
  summary: Provide local-first package management for reusable SpecPackage and BoundarySpec bundles without executing package content.
scope:
  boundedContext: specpm
  includes:
    - Validate restricted YAML SpecPackage directories.
    - Inspect package metadata, BoundarySpec summaries, evidence, provenance, effects, and contract warnings.
    - Pack packages into deterministic specpm-tar-gzip-v0 archives.
    - Maintain a local file-backed registry index.
    - Search the local registry by exact capability IDs.
    - Add selected packages into deterministic local project state.
    - Mark local indexed packages as yanked or unyanked.
    - Diff package versions using conservative structural classification.
    - Inspect local SpecGraph export inbox bundles.
    - Publish portable conformance artifacts for local implementation behavior.
    - Document the post-MVP read-only remote registry API contract.
    - Publish static conformance fixtures for remote registry payload shape.
    - Fetch read-only remote registry metadata for registry status, package index, package lookup, package version lookup, and exact capability search.
    - Document the split between public GitHub-backed SpecPM Index submissions and enterprise remote registry deployments.
    - Provide a GitHub Issue form for public SpecPackage index submissions.
    - Provide a GitHub Issue form for public SpecPackage index removal requests.
    - Provide a GitHub Issue form for public SpecPM Index namespace claim requests.
    - Document public SpecPM Index namespace claim review policy and dispute handling.
    - Triage namespace claim issues with conservative GitHub label automation.
    - Report maintainer-applied namespace claim decision labels without deciding claims.
    - Validate public SpecPackage index submissions through a GitHub Actions workflow without publishing packages.
    - Generate static read-only public index metadata and deterministic archives for GitHub Pages-style hosting.
    - Track maintainer-reviewed accepted package directories and pinned public Git sources for generated public index deployment.
    - Serve generated public index metadata locally through Docker Compose for ecosystem integration testing.
    - Deploy generated public index metadata as static `/v0` GitHub Pages content alongside DocC documentation.
    - Document the boundary between SpecPM exact lookup and downstream plain-text intent discovery.
    - Build and deploy DocC documentation for the package contract.
    - Document the public CLI command surface exposed by src/specpm/cli.py.
    - Document the importable public core functions exposed by src/specpm/core.py.
  excludes:
    - Remote registry service implementation.
    - specpm publish.
    - Remote package archive download, install, or cache behavior.
    - Remote registry mutation APIs.
    - Remote package yanking governance.
    - Package signing and trust policy.
    - Namespace governance.
    - Natural-language, fuzzy, or semantic search as normative resolution.
    - LLM, embedding, vector search, or RAG-based intent resolution.
    - Full dependency solving.
    - PRD, brief, issue breakdown, test plan, or review report generation.
    - Artifact evaluation runtime.
    - Package-provided prompt or workflow execution.
    - SpecGraph canonical graph reasoning, refinement, or proposal lanes.
provides:
  capabilities:
    - id: specpm.package.validate
      role: primary
      summary: Validate SpecPackage directories and emit structured validation reports.
    - id: specpm.package.inspect
      role: secondary
      summary: Inspect package identity, specs, evidence, provenance, effects, compatibility, and contract warnings.
    - id: specpm.package.pack
      role: secondary
      summary: Create deterministic specpm-tar-gzip-v0 archives from valid package directories.
    - id: specpm.registry.index
      role: secondary
      summary: Add directory or archive packages to a local file-backed registry index.
    - id: specpm.registry.search
      role: secondary
      summary: Search indexed packages by exact capability ID.
    - id: specpm.registry.add
      role: secondary
      summary: Add exact package references or uniquely resolved capabilities to local project state.
    - id: specpm.registry.local_lifecycle
      role: secondary
      summary: Mark indexed local package versions as yanked or unyanked without deleting package metadata.
    - id: specpm.package.diff
      role: secondary
      summary: Compare two package directories and classify structural capability, interface, constraint, and compatibility changes.
    - id: specpm.specgraph.inbox
      role: secondary
      summary: List and inspect local SpecGraph export bundles as reviewable package candidates.
    - id: specpm.conformance.local_suite
      role: secondary
      summary: Provide repository-relative conformance fixtures for validation and local registry lifecycle behavior.
    - id: specpm.registry.remote_api_contract
      role: secondary
      summary: Document the post-MVP read-only remote registry API contract.
    - id: specpm.registry.index_submission_flow
      role: secondary
      summary: Document issue-based public index submissions and enterprise registry deployment boundaries.
    - id: specpm.registry.index_removal_request_flow
      role: secondary
      summary: Collect maintainer-reviewed public index removal requests without mutating registry state.
    - id: specpm.registry.namespace_claim_request_flow
      role: secondary
      summary: Collect maintainer-reviewed public index namespace claim requests without granting ownership or mutating registry state.
    - id: specpm.registry.namespace_claim_policy
      role: secondary
      summary: Document namespace claim review labels, criteria, outcomes, and dispute handling without enforcing ownership.
    - id: specpm.registry.namespace_claim_label_triage
      role: secondary
      summary: Apply namespace claim review labels and policy comments without deciding claims or mutating registry state.
    - id: specpm.registry.namespace_claim_decision_reports
      role: secondary
      summary: Report maintainer-applied namespace claim decision labels without applying labels or mutating registry state.
    - id: specpm.registry.remote_readonly_client
      role: secondary
      summary: Fetch and validate read-only remote registry status, package index, and package metadata without downloading archives or mutating local state.
    - id: specpm.registry.public_static_index
      role: secondary
      summary: Generate static /v0 public index metadata and deterministic archives for read-only hosting.
    - id: specpm.registry.public_index_accepted_manifest
      role: secondary
      summary: Track reviewed package sources that feed generated public index deployment.
    - id: specpm.registry.public_index_remote_sources
      role: secondary
      summary: Resolve pinned public Git package sources from the accepted manifest before static index generation.
    - id: specpm.registry.local_dev_service
      role: secondary
      summary: Serve generated public index metadata locally for SpecGraph, ContextBuilder, and manual integration testing.
    - id: specpm.registry.public_pages_deployment
      role: secondary
      summary: Publish generated read-only public index metadata through GitHub Pages static hosting.
    - id: specpm.conformance.remote_registry_payloads
      role: secondary
      summary: Provide static remote registry API payload fixtures for shape validation without HTTP execution.
    - id: specpm.documentation.docc_site
      role: secondary
      summary: Build a DocC documentation site for SpecPM contracts and package-manager boundaries.
    - id: specpm.cli.public_surface
      role: secondary
      summary: Expose the implemented CLI commands as the stable user-facing surface for the MVP.
    - id: specpm.public_api.core_functions
      role: secondary
      summary: Expose importable Python functions for validation, inspection, packing, indexing, search, add, lifecycle, diff, and inbox flows.
requires:
  capabilities: []
interfaces:
  inbound:
    - id: cli_validate
      kind: cli
      summary: specpm validate <package-dir> [--json]
      outputs:
        - name: validation_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_inspect
      kind: cli
      summary: specpm inspect <package-dir> [--json]
      outputs:
        - name: inspection_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_pack
      kind: cli
      summary: specpm pack <package-dir> [-o <archive>] [--json]
      outputs:
        - name: pack_result
          mediaTypes:
            - application/json
            - application/gzip
    - id: cli_index
      kind: cli
      summary: specpm index <package-dir-or-archive> [--index <path>] [--json]
      outputs:
        - name: index_report
          mediaTypes:
            - application/json
    - id: cli_search
      kind: cli
      summary: specpm search <capability-id> [--index <path>] [--json]
      outputs:
        - name: search_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_add
      kind: cli
      summary: specpm add <capability-id-or-package-ref> [--index <path>] [--project <dir>] [--json]
      outputs:
        - name: add_report
          mediaTypes:
            - application/json
    - id: cli_yank
      kind: cli
      summary: specpm yank <package-id@version> [--index <path>] --reason <reason> [--json]
      outputs:
        - name: yank_report
          mediaTypes:
            - application/json
    - id: cli_unyank
      kind: cli
      summary: specpm unyank <package-id@version> [--index <path>] [--json]
      outputs:
        - name: unyank_report
          mediaTypes:
            - application/json
    - id: cli_diff
      kind: cli
      summary: specpm diff <old-package-dir> <new-package-dir> [--json]
      outputs:
        - name: diff_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_inbox
      kind: cli
      summary: specpm inbox list and specpm inbox inspect for local SpecGraph export bundles.
      outputs:
        - name: inbox_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_remote
      kind: cli
      summary: specpm remote status, specpm remote packages, specpm remote package, specpm remote version, and specpm remote search for read-only registry metadata.
      outputs:
        - name: remote_registry_client_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_public-index
      kind: cli
      summary: specpm public-index generate for static read-only /v0 registry metadata output from package directories or an accepted package manifest.
      outputs:
        - name: public_index_generator_report
          mediaTypes:
            - application/json
            - text/plain
    - id: python_core_api
      kind: library
      summary: Importable functions in specpm.core for automation and tests.
      functions:
        - validate_package
        - inspect_package
        - pack_package
        - index_package
        - search_index
        - add_package
        - yank_index_package
        - unyank_index_package
        - get_remote_registry_status
        - get_remote_package_index
        - get_remote_package
        - get_remote_package_version
        - search_remote_registry
        - validate_remote_registry_payload
        - diff_packages
        - list_inbox
        - inspect_inbox_bundle
      outputs:
        - name: structured_reports
          mediaTypes:
            - application/json
  outbound:
    - id: package_archive
      kind: file
      summary: Deterministic .specpm.tgz package archives.
    - id: local_index
      kind: file
      summary: Local .specpm/index.json registry metadata.
    - id: project_state
      kind: file
      summary: Local specpm.lock and .specpm package metadata in consuming projects.
    - id: conformance_suite
      kind: file
      summary: Repository-relative JSON conformance suite and fixture packages.
    - id: docc_static_site
      kind: file
      summary: Static DocC documentation output deployed to GitHub Pages.
    - id: public_index_static_site
      kind: file
      summary: Static /v0 public index metadata and deterministic package archives.
    - id: public_index_accepted_manifest
      kind: file
      summary: Maintainer-reviewed local and pinned public Git package sources that feed generated public index output.
    - id: local_public_index_service
      kind: http
      summary: Serves generated read-only public index metadata on a local development port.
effects:
  sideEffects:
    - id: read_package_data
      kind: filesystem_read
      summary: Reads manifests, BoundarySpecs, evidence, foreign artifacts, implementation bindings, indexes, locks, inbox bundles, and accepted public-index package lists.
    - id: write_local_artifacts
      kind: filesystem_write
      summary: Writes deterministic archives, local index files, lockfiles, package cache metadata, and DocC build output.
    - id: read_remote_registry_metadata
      kind: network_read
      summary: Reads explicitly requested remote registry JSON metadata through the read-only client.
    - id: read_public_index_source_repositories
      kind: network_read
      summary: Checks out pinned public Git package sources listed in the accepted public-index manifest for static generation.
    - id: no_package_execution
      kind: unknown
      summary: Package content is treated as data and is not executed by SpecPM core.
constraints:
  - id: package_content_untrusted
    level: MUST
    statement: SpecPM must treat package content as untrusted data.
  - id: no_package_execution
    level: MUST
    statement: SpecPM must not execute package-provided prompts, scripts, generation instructions, or artifact workflows.
  - id: exact_search_normative
    level: MUST
    statement: MVP search must use exact capability ID matching for normative resolution.
  - id: no_semantic_authority
    level: MUST
    statement: SpecPM must not treat LLM, embedding, vector search, or RAG output as authoritative package meaning.
  - id: deterministic_outputs
    level: MUST
    statement: Archives, local index updates, lockfiles, and JSON reports must remain deterministic for stable inputs.
  - id: public_surface_tracked
    level: MUST
    statement: This self-spec must cover at least the implemented public CLI commands and importable core functions.
  - id: derived_artifacts_downstream
    level: MUST
    statement: PRDs, briefs, issue breakdowns, test plans, and review reports are downstream derived artifacts, not SpecPM core outputs.
evidence:
  - id: license
    kind: documentation
    path: LICENSE
    supports:
      - metadata.license
  - id: readme
    kind: documentation
    path: README.md
    supports:
      - intent.summary
      - provides.capabilities
  - id: prd
    kind: documentation
    path: specs/PRD.md
    supports:
      - scope.includes
      - scope.excludes
      - provides.capabilities
  - id: json_contracts
    kind: schema
    path: specs/JSON_CONTRACTS.md
    supports:
      - interfaces.inbound
      - interfaces.outbound
  - id: conformance_docs
    kind: documentation
    path: specs/CONFORMANCE.md
    supports:
      - specpm.conformance.local_suite
      - specpm.conformance.remote_registry_payloads
  - id: conformance_fixtures
    kind: test
    path: tests/fixtures/conformance
    supports:
      - specpm.conformance.local_suite
      - specpm.conformance.remote_registry_payloads
  - id: remote_registry_api
    kind: documentation
    path: specs/REMOTE_REGISTRY_API.md
    supports:
      - specpm.registry.remote_api_contract
      - specpm.registry.remote_readonly_client
      - specpm.conformance.remote_registry_payloads
  - id: index_submission_flow
    kind: documentation
    path: specs/INDEX_SUBMISSION_FLOW.md
    supports:
      - specpm.registry.index_submission_flow
      - specpm.registry.remote_api_contract
  - id: add_specpackages_issue_template
    kind: documentation
    path: .github/ISSUE_TEMPLATE/add-specpackages.yml
    supports:
      - specpm.registry.index_submission_flow
  - id: remove_specpackages_issue_template
    kind: documentation
    path: .github/ISSUE_TEMPLATE/remove-specpackages.yml
    supports:
      - specpm.registry.index_removal_request_flow
      - specpm.registry.index_submission_flow
  - id: claim_namespace_issue_template
    kind: documentation
    path: .github/ISSUE_TEMPLATE/claim-namespace.yml
    supports:
      - specpm.registry.namespace_claim_request_flow
      - specpm.registry.index_submission_flow
  - id: namespace_claim_policy
    kind: documentation
    path: specs/NAMESPACE_CLAIM_POLICY.md
    supports:
      - specpm.registry.namespace_claim_policy
      - specpm.registry.namespace_claim_request_flow
      - specpm.registry.index_submission_flow
  - id: namespace_claim_triage_workflow
    kind: source
    path: .github/workflows/namespace-claim-triage.yml
    supports:
      - specpm.registry.namespace_claim_label_triage
      - specpm.registry.namespace_claim_policy
      - specpm.registry.namespace_claim_request_flow
  - id: namespace_claim_decision_report_workflow
    kind: source
    path: .github/workflows/namespace-claim-decision-report.yml
    supports:
      - specpm.registry.namespace_claim_decision_reports
      - specpm.registry.namespace_claim_policy
      - specpm.registry.namespace_claim_request_flow
  - id: package_submission_workflow
    kind: documentation
    path: .github/workflows/package-submission-check.yml
    supports:
      - specpm.registry.index_submission_flow
  - id: index_submission_validator
    kind: source
    path: src/specpm/index_submission.py
    supports:
      - specpm.registry.index_submission_flow
  - id: public_index_generator
    kind: source
    path: src/specpm/public_index.py
    supports:
      - specpm.registry.public_static_index
      - specpm.registry.public_index_accepted_manifest
      - specpm.registry.public_index_remote_sources
      - specpm.registry.local_dev_service
      - specpm.registry.remote_api_contract
  - id: public_index_accepted_manifest
    kind: package_manifest
    path: public-index/accepted-packages.yml
    supports:
      - specpm.registry.public_index_accepted_manifest
      - specpm.registry.public_index_remote_sources
      - specpm.registry.public_pages_deployment
  - id: compose
    kind: source
    path: compose.yaml
    supports:
      - specpm.registry.local_dev_service
  - id: public_index_service_script
    kind: source
    path: scripts/serve_public_index.py
    supports:
      - specpm.registry.local_dev_service
  - id: makefile
    kind: source
    path: Makefile
    supports:
      - specpm.registry.local_dev_service
  - id: rfc_coverage
    kind: documentation
    path: specs/RFC_0001_COVERAGE.md
    supports:
      - scope.includes
      - scope.excludes
  - id: intent_discovery_boundary
    kind: documentation
    path: specs/INTENT_DISCOVERY_BOUNDARY.md
    supports:
      - exact_search_normative
      - no_semantic_authority
      - scope.excludes
  - id: derived_boundary
    kind: adr
    path: specs/0001_Derived_Artifact_Profile_Decision.md
    supports:
      - derived_artifacts_downstream
      - no_package_execution
  - id: cli_source
    kind: source
    path: src/specpm/cli.py
    supports:
      - specpm.cli.public_surface
      - interfaces.inbound
  - id: core_source
    kind: source
    path: src/specpm/core.py
    supports:
      - specpm.public_api.core_functions
      - provides.capabilities
      - specpm.registry.remote_readonly_client
  - id: core_tests
    kind: test
    path: tests/test_core.py
    supports:
      - provides.capabilities
      - constraints
  - id: docc_overview
    kind: documentation
    path: Sources/SpecPM/Documentation.docc/SpecPM.md
    supports:
      - specpm.documentation.docc_site
  - id: docs_pages_workflow
    kind: source
    path: .github/workflows/docs.yml
    supports:
      - specpm.documentation.docc_site
      - specpm.registry.public_pages_deployment
      - specpm.registry.public_index_accepted_manifest
implementationBindings:
  - id: cli
    path: src/specpm/cli.py
    files:
      owned:
        - src/specpm/cli.py
      border:
        - README.md
        - specs/CLI_EXIT_CODES.md
  - id: core
    path: src/specpm/core.py
    files:
      owned:
        - src/specpm/core.py
      border:
        - specs/JSON_CONTRACTS.md
        - specs/CONFORMANCE.md
        - specs/REMOTE_REGISTRY_API.md
  - id: tests
    path: tests/test_core.py
    files:
      owned:
        - tests/test_core.py
  - id: index_submission_validator
    path: src/specpm/index_submission.py
    files:
      owned:
        - src/specpm/index_submission.py
        - scripts/validate_index_submission.py
        - .github/workflows/package-submission-check.yml
      border:
        - .github/ISSUE_TEMPLATE/add-specpackages.yml
        - specs/INDEX_SUBMISSION_FLOW.md
  - id: public_index_generator
    path: src/specpm/public_index.py
    files:
      owned:
        - src/specpm/public_index.py
      border:
        - src/specpm/cli.py
        - public-index/accepted-packages.yml
        - scripts/serve_public_index.py
        - compose.yaml
        - Makefile
        - specs/INDEX_SUBMISSION_FLOW.md
        - specs/REMOTE_REGISTRY_API.md
        - specs/JSON_CONTRACTS.md
  - id: docc
    path: Sources/SpecPM/Documentation.docc/SpecPM.md
    files:
      owned:
        - Sources/SpecPM/Documentation.docc/SpecPM.md
        - .github/workflows/docs.yml
        - Sources/SpecPM/Documentation.docc/PackageModel.md
        - Sources/SpecPM/Documentation.docc/CLIReference.md
        - Sources/SpecPM/Documentation.docc/JSONContracts.md
        - Sources/SpecPM/Documentation.docc/Conformance.md
        - Sources/SpecPM/Documentation.docc/SpecGraphIntegration.md
        - Sources/SpecPM/Documentation.docc/BoundariesAndTrust.md
        - Sources/SpecPM/Documentation.docc/IntentDiscoveryBoundary.md
        - Sources/SpecPM/Documentation.docc/Roadmap.md
provenance:
  sourceConfidence:
    intent: high
    boundary: high
    behavior: high
keywords:
  - specpackage
  - boundaryspec
  - local-registry
  - conformance
  - specgraph
compatibility:
  platforms:
    - any
  languages:
    - python
    - swift
