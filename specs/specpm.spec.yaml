apiVersion: specpm.dev/v0.1
kind: BoundarySpec
metadata:
  id: specpm.core
  title: SpecPM Core Package Manager
  version: 0.2.0
  status: draft
  authors:
    - name: 0AL Spec
    - name: Egor Merkushev
intent:
  summary: Provide local-first package management for reusable SpecPackage and BoundarySpec bundles without executing package content.
scope:
  boundedContext: specpm
  includes:
    - Validate restricted YAML SpecPackage directories.
    - Inspect package metadata, BoundarySpec summaries, evidence, provenance, effects, and contract warnings.
    - Pack packages into deterministic specpm-tar-gzip-v0 archives.
    - Maintain a local file-backed registry index.
    - Search the local registry by exact capability IDs.
    - Search local and remote registry metadata by exact declared canonical intent IDs.
    - Publish and read observed intent catalog metadata from accepted package declarations.
    - Add selected packages into deterministic local project state.
    - Mark local indexed packages as yanked or unyanked.
    - Diff package versions using conservative structural classification.
    - Inspect local SpecGraph export inbox bundles.
    - Publish portable conformance artifacts for local implementation behavior.
    - Document the post-MVP read-only remote registry API contract.
    - Publish static conformance fixtures for remote registry payload shape.
    - Publish conformance cases for generated public static index endpoints and enterprise registry compatibility payloads.
    - Fetch read-only remote registry metadata for registry status, package index, package lookup, package version lookup, and exact capability search.
    - Document the split between public GitHub-backed SpecPM Index submissions and enterprise remote registry deployments.
    - Provide a GitHub Issue form for public SpecPackage index submissions.
    - Publish a public web and DocC submission guide for issue-based SpecPackage index intake.
    - Provide a GitHub Issue form for public SpecPackage index removal requests.
    - Provide a GitHub Issue form for public SpecPM Index namespace claim requests.
    - Document public SpecPM Index namespace claim review policy and dispute handling.
    - Triage namespace claim issues with conservative GitHub label automation.
    - Report maintainer-applied namespace claim decision labels without deciding claims.
    - Summarize namespace claim decision labels through read-only GitHub workflow artifacts.
    - Validate public SpecPackage index submissions through a GitHub Actions workflow without publishing packages.
    - Generate static read-only public index metadata and deterministic archives for GitHub Pages-style hosting.
    - Track maintainer-reviewed accepted package directories and pinned public Git sources for generated public index deployment.
    - Document the remote package acquisition boundary before implementing archive fetch, cache, lock, or remote add behavior.
    - Seed the public alpha registry with SpecPM and SpecNode packages for early ecosystem integration.
    - Serve generated public index metadata locally through Docker Compose for ecosystem integration testing.
    - Deploy generated public index metadata as static `/v0` GitHub Pages content alongside DocC documentation.
    - Publish a static browser viewer for the public `/v0` registry API.
    - Capture reusable read-only public registry observation reports for local Docker and GitHub Pages endpoints.
    - Document the downstream registry consumer contract for exact `/v0` endpoint evidence, drift reporting, and read-only obligations.
    - Document the SpecGraph public registry observation evidence contract for package visibility, lifecycle, capability, intent, and drift findings.
    - Document the static registry pipeline that turns reviewed accepted package sources into build-time `/v0` API files served by GitHub Pages.
    - Run and document a deploy-first local Docker and GitHub Pages smoke workflow for registry-related changes.
    - Document registry operations for fresh public static index deployment, Git-based rollback, backup/restore, and flood/DDoS planning.
    - Document GitHub Actions runtime maintenance policy for official action major updates and post-merge verification.
    - Document GitHub Actions workflow permissions, secret usage, pull_request_target review, and deploy trust boundaries.
    - Publish a current roadmap that separates the public alpha baseline from operator UX, downstream integration, remote acquisition, trust, enterprise, and intent resolver tracks.
    - Document the identifier model that separates package IDs, package-owned capability IDs, and package-neutral canonical intent IDs.
    - Document intent taxonomy governance for proposing, reviewing, deprecating, superseding, rejecting, and reserving canonical `intent.*` IDs.
    - Document package signing, revocation, yanked/deprecated semantics, verification boundaries, and provenance receipt expectations before runtime enforcement.
    - Document the provenance receipt schema and audit evidence profile for future registry, acquisition, and trust verification work.
    - Generate non-authoritative provenance receipt artifacts for public static index package versions.
    - Document producer receipt requirements for generated SpecPackage candidates without making SpecPM run or trust producer tools.
    - Document abstract SpecPackage contracts and seed the registry with an abstract public repository metadata contract.
    - Recognize `public_interface_index` as a known evidence kind for deterministic public interface summaries.
    - Document API versioning boundaries across package schemas, registry payloads, endpoint families, archive formats, CLI JSON contracts, and conformance suites.
    - Validate first-class manifest intent summaries through `index.provides.intents` backed by BoundarySpec capability `intentIds`.
    - Expose observed intent catalog metadata without treating observations as canonical dictionary entries.
    - Document the boundary between SpecPM exact lookup and downstream plain-text intent discovery.
    - Build and deploy DocC documentation for the package contract.
    - Provide experimental Agent Skills for authoring and reviewing SpecPM package specs.
    - Document the public CLI command surface exposed by src/specpm/cli.py.
    - Document the importable public core functions exposed by src/specpm/core.py.
  excludes:
    - Remote registry service implementation.
    - specpm publish.
    - Remote package archive download, install, or cache behavior.
    - Remote registry mutation APIs.
    - Remote package yanking governance.
    - Package signature verification runtime, signing key management, and trust policy enforcement.
    - Provenance receipt verification, trust enforcement, and lockfile enforcement.
    - Producer receipt generation, producer execution, analyzer execution, and generated package acceptance.
    - Namespace governance.
    - Natural-language, fuzzy, or semantic search as normative resolution.
    - LLM, embedding, vector search, or RAG-based intent resolution.
    - Plain-text inference of canonical intent IDs.
    - Full dependency solving.
    - PRD, brief, issue breakdown, test plan, or review report generation.
    - Artifact evaluation runtime.
    - Package-provided prompt or workflow execution.
    - Online intent-to-spec runtime.
    - Public remote registry mutation, package upload, or package publish APIs.
    - Production backup automation, rollback orchestration, rate limiting, or DDoS enforcement.
    - Authenticated enterprise registry operations or online intent-to-spec service operations.
    - SpecGraph canonical graph reasoning, refinement, or proposal lanes.
provides:
  capabilities:
    - id: specpm.package.validate
      role: primary
      summary: Validate SpecPackage directories and emit structured validation reports.
    - id: specpm.package.inspect
      role: secondary
      summary: Inspect package identity, specs, evidence, provenance, effects, compatibility, and contract warnings.
    - id: specpm.package.pack
      role: secondary
      summary: Create deterministic specpm-tar-gzip-v0 archives from valid package directories.
    - id: specpm.registry.index
      role: secondary
      summary: Add directory or archive packages to a local file-backed registry index.
    - id: specpm.registry.search
      role: secondary
      summary: Search indexed packages by exact capability ID.
    - id: specpm.registry.intent_search
      role: secondary
      summary: Search local and remote registry metadata by exact canonical intent ID when package capabilities declare intentIds.
      intentIds:
        - intent.registry.intent_lookup
    - id: specpm.registry.observed_intent_catalog
      role: secondary
      summary: Generate and read observed intent catalog metadata from accepted packages without making observations canonical.
      intentIds:
        - intent.registry.intent_lookup
    - id: specpm.registry.add
      role: secondary
      summary: Add exact package references or uniquely resolved capabilities to local project state.
    - id: specpm.registry.local_lifecycle
      role: secondary
      summary: Mark indexed local package versions as yanked or unyanked without deleting package metadata.
    - id: specpm.package.diff
      role: secondary
      summary: Compare two package directories and classify structural capability, interface, constraint, and compatibility changes.
    - id: specpm.specgraph.inbox
      role: secondary
      summary: List and inspect local SpecGraph export bundles as reviewable package candidates.
    - id: specpm.conformance.local_suite
      role: secondary
      summary: Provide repository-relative conformance fixtures for validation and local registry lifecycle behavior.
    - id: specpm.registry.remote_api_contract
      role: secondary
      summary: Document the post-MVP read-only remote registry API contract, including the static `/v0` root entrypoint and endpoint payloads.
    - id: specpm.registry.index_submission_flow
      role: secondary
      summary: Document issue-based public index submissions and enterprise registry deployment boundaries.
    - id: specpm.registry.accepted_manifest_pr_helper
      role: secondary
      summary: Prepare reviewed accepted-manifest pull request inputs from valid package-submission reports without deciding acceptance.
    - id: specpm.registry.index_removal_request_flow
      role: secondary
      summary: Collect maintainer-reviewed public index removal requests without mutating registry state.
    - id: specpm.registry.namespace_claim_request_flow
      role: secondary
      summary: Collect maintainer-reviewed public index namespace claim requests without granting ownership or mutating registry state.
    - id: specpm.registry.namespace_claim_policy
      role: secondary
      summary: Document namespace claim review labels, criteria, outcomes, and dispute handling without enforcing ownership.
    - id: specpm.registry.namespace_claim_label_triage
      role: secondary
      summary: Apply namespace claim review labels and policy comments without deciding claims or mutating registry state.
    - id: specpm.registry.namespace_claim_decision_reports
      role: secondary
      summary: Report maintainer-applied namespace claim decision labels without applying labels or mutating registry state.
    - id: specpm.registry.namespace_claim_decision_summary
      role: secondary
      summary: Aggregate namespace claim decision labels into read-only workflow summaries and artifacts.
    - id: specpm.registry.remote_readonly_client
      role: secondary
      summary: Fetch and validate read-only remote registry status, package index, package metadata, and observed intent catalog metadata without downloading archives or mutating local state.
    - id: specpm.registry.public_static_index
      role: secondary
      summary: Generate static /v0 public index metadata, root entrypoint, and deterministic archives for read-only hosting.
    - id: specpm.registry.public_api_viewer
      role: secondary
      summary: Publish a static browser viewer for navigating the `/v0` registry API without a mutable backend.
    - id: specpm.registry.public_index_accepted_manifest
      role: secondary
      summary: Track reviewed package sources that feed generated public index deployment.
    - id: specpm.registry.public_index_remote_sources
      role: secondary
      summary: Resolve pinned public Git package sources from the accepted manifest before static index generation.
    - id: specpm.registry.remote_package_acquisition_policy
      role: secondary
      summary: Document the trust, digest verification, cache, lockfile, and failure-mode boundary for future remote package acquisition.
    - id: specpm.registry.package_signing_revocation_policy
      role: secondary
      summary: Document package signing, verification, revocation, yanked/deprecated semantics, and provenance receipt boundaries before runtime enforcement.
    - id: specpm.registry.provenance_receipt_schema
      role: secondary
      summary: Document the draft SpecPMProvenanceReceipt envelope, public static profile, and audit evidence sections.
    - id: specpm.registry.public_index_provenance_receipts
      role: secondary
      summary: Generate non-authoritative SpecPMProvenanceReceipt artifacts for public static index package versions without treating receipts as trust authority.
    - id: specpm.specs.producer_receipt_contract
      role: secondary
      summary: Document the draft SpecPMProducerReceipt envelope and generated package profile for producer tools such as SpecHarvester without running producers.
    - id: specpm.specs.producer_bundle_proposal_policy
      role: secondary
      summary: Document SpecPM-side proposal review policy for producer candidate bundles without treating producer evidence as registry authority.
    - id: specpm.specs.producer_bundle_proposal_automation
      role: secondary
      summary: Document the machine-readable SpecHarvester-to-SpecPM proposal body contract for producer evidence links and acceptance decision metadata.
    - id: specpm.specs.producer_bundle_fixture_policy
      role: secondary
      summary: Document shared SpecPM and SpecHarvester fixture ownership and drift-sensitive producer bundle fields.
    - id: specpm.specs.spec_quality_model
      role: secondary
      summary: Document the review model for SpecPackage validation, evidence coverage, boundary discipline, interface depth, reproducibility, and consumer utility.
    - id: specpm.registry.acceptance_decision_record
      role: secondary
      summary: Document external maintainer registry acceptance decision records that link producer evidence without making receipts authoritative.
    - id: specpm.registry.public_alpha_index
      role: secondary
      summary: Seed and document the read-only public alpha registry package set for SpecPM, SpecNode, and example packages.
    - id: specpm.registry.public_alpha_smoke
      role: secondary
      summary: Verify local and deployed public alpha registry visibility for seed packages and capabilities through read-only smoke targets.
    - id: specpm.registry.public_observation_report
      role: secondary
      summary: Generate reusable read-only public registry observation reports for downstream evidence consumers.
    - id: specpm.registry.downstream_consumer_contract
      role: secondary
      summary: Document exact `/v0` endpoint classes, evidence fields, failure vocabulary, and read-only obligations for downstream registry consumers.
    - id: specpm.registry.specgraph_observation_contract
      role: secondary
      summary: Document the read-only `/v0` evidence SpecGraph can cite for package visibility, lifecycle state, capability, intent, and drift observations.
    - id: specpm.registry.static_registry_pipeline_docs
      role: secondary
      summary: Document the build-time static registry pipeline and request-time GitHub Pages serving boundary.
    - id: specpm.registry.local_dev_service
      role: secondary
      summary: Serve generated public index metadata locally for SpecGraph, ContextBuilder, and manual integration testing.
    - id: specpm.registry.public_pages_deployment
      role: secondary
      summary: Publish generated read-only public index metadata through GitHub Pages static hosting.
    - id: specpm.deployment.deploy_first_workflow
      role: secondary
      summary: Run and document Docker-backed local registry deploy smoke checks and GitHub Pages registry smoke checks.
    - id: specpm.deployment.registry_operations_runbook
      role: secondary
      summary: Document fresh public static index deployment, Git-based rollback, backup/restore boundaries, and flood/DDoS planning.
    - id: specpm.deployment.github_actions_maintenance_policy
      role: secondary
      summary: Document GitHub Actions runtime maintenance policy for official action major refs, guard-test coverage, and post-merge verification boundaries.
    - id: specpm.deployment.github_actions_permissions_policy
      role: secondary
      summary: Document GitHub Actions workflow permissions, secret usage, pull_request_target review rules, and deploy trust boundaries.
    - id: specpm.roadmap.current_status
      role: secondary
      summary: Document the current public alpha baseline, milestone tracks, non-goals, and near-term PR candidates.
    - id: specpm.intent.identifier_model
      role: secondary
      summary: Document package IDs, capability IDs, canonical intent IDs, and exact capability-to-intent mappings.
      intentIds:
        - intent.specification.identifier_model
    - id: specpm.intent.taxonomy_governance
      role: secondary
      summary: Document review, lifecycle, conflict, experimental namespace, and downstream boundary rules for canonical intent taxonomy.
      intentIds:
        - intent.specification.identifier_model
    - id: specpm.specs.abstract_conformance_targets
      role: secondary
      summary: Document abstract SpecPackage contracts and publish the first abstract public repository metadata contract.
    - id: specpm.specs.public_interface_index_evidence
      role: secondary
      summary: Recognize public interface index artifacts as a known evidence kind without executing or parsing the artifact.
    - id: specpm.api.versioning_policy
      role: secondary
      summary: Document distinct API versioning surfaces for package schemas, registry payloads, endpoint families, archives, CLI JSON reports, and conformance suites.
    - id: specpm.conformance.remote_registry_payloads
      role: secondary
      summary: Provide static remote registry API payload fixtures for shape validation without HTTP execution.
    - id: specpm.conformance.fixture_manifest
      role: secondary
      summary: Provide versioned conformance fixture metadata for downstream consumers that pin SpecPM by commit.
    - id: specpm.conformance.public_enterprise_registry_suite
      role: secondary
      summary: Provide conformance cases for generated public static index endpoints and enterprise registry compatibility payloads.
    - id: specpm.documentation.docc_site
      role: secondary
      summary: Build a DocC documentation site for SpecPM contracts and package-manager boundaries.
    - id: specpm.agent_skills.spec_authoring
      role: secondary
      summary: Provide an installable experimental Agent Skill for authoring SpecPackage and BoundarySpec files from repository evidence.
    - id: specpm.agent_skills.spec_review
      role: secondary
      summary: Provide an installable experimental Agent Skill for reviewing and fixing SpecPM package specifications.
    - id: specpm.cli.public_surface
      role: secondary
      summary: Expose the implemented CLI commands as the stable user-facing surface for the MVP.
    - id: specpm.public_api.core_functions
      role: secondary
      summary: Expose importable Python functions for validation, inspection, packing, indexing, search, add, lifecycle, diff, and inbox flows.
requires:
  capabilities: []
interfaces:
  inbound:
    - id: cli_validate
      kind: cli
      summary: specpm validate <package-dir> [--json]
      outputs:
        - name: validation_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_inspect
      kind: cli
      summary: specpm inspect <package-dir> [--json]
      outputs:
        - name: inspection_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_pack
      kind: cli
      summary: specpm pack <package-dir> [-o <archive>] [--json]
      outputs:
        - name: pack_result
          mediaTypes:
            - application/json
            - application/gzip
    - id: cli_index
      kind: cli
      summary: specpm index <package-dir-or-archive> [--index <path>] [--json]
      outputs:
        - name: index_report
          mediaTypes:
            - application/json
    - id: cli_search
      kind: cli
      summary: specpm search <capability-id> [--index <path>] [--json]
      outputs:
        - name: search_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_search-intent
      kind: cli
      summary: specpm search-intent <intent-id> [--index <path>] [--json]
      outputs:
        - name: intent_search_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_add
      kind: cli
      summary: specpm add <capability-id-or-package-ref> [--index <path>] [--project <dir>] [--json]
      outputs:
        - name: add_report
          mediaTypes:
            - application/json
    - id: cli_yank
      kind: cli
      summary: specpm yank <package-id@version> [--index <path>] --reason <reason> [--json]
      outputs:
        - name: yank_report
          mediaTypes:
            - application/json
    - id: cli_unyank
      kind: cli
      summary: specpm unyank <package-id@version> [--index <path>] [--json]
      outputs:
        - name: unyank_report
          mediaTypes:
            - application/json
    - id: cli_diff
      kind: cli
      summary: specpm diff <old-package-dir> <new-package-dir> [--json]
      outputs:
        - name: diff_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_inbox
      kind: cli
      summary: specpm inbox list and specpm inbox inspect for local SpecGraph export bundles.
      outputs:
        - name: inbox_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_remote
      kind: cli
      summary: specpm remote status, specpm remote packages, specpm remote package, specpm remote version, specpm remote search, specpm remote intents, specpm remote intent, specpm remote search-intent, and specpm remote observe for read-only registry metadata.
      outputs:
        - name: remote_registry_client_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_public-index
      kind: cli
      summary: specpm public-index generate for static read-only /v0 registry metadata, root entrypoint, and package archives from package directories or an accepted package manifest.
      outputs:
        - name: public_index_generator_report
          mediaTypes:
            - application/json
            - text/plain
    - id: cli_producer-bundle
      kind: cli
      summary: specpm producer-bundle preflight for consumer-side review of producerEvidenceLinks and registryAcceptanceDecision proposal evidence.
      outputs:
        - name: producer_bundle_preflight_report
          mediaTypes:
            - application/json
            - text/plain
    - id: python_core_api
      kind: library
      summary: Importable functions in specpm.core for automation and tests.
      functions:
        - validate_package
        - inspect_package
        - pack_package
        - index_package
        - search_index
        - search_intent_index
        - add_package
        - yank_index_package
        - unyank_index_package
        - get_remote_registry_status
        - get_remote_package_index
        - get_remote_intent_index
        - get_remote_intent
        - get_remote_package
        - get_remote_package_version
        - search_remote_registry
        - search_remote_registry_intent
        - observe_remote_registry
        - validate_remote_registry_payload
        - diff_packages
        - list_inbox
        - inspect_inbox_bundle
      outputs:
        - name: structured_reports
          mediaTypes:
            - application/json
  outbound:
    - id: package_archive
      kind: file
      summary: Deterministic .specpm.tgz package archives.
    - id: local_index
      kind: file
      summary: Local .specpm/index.json registry metadata.
    - id: project_state
      kind: file
      summary: Local specpm.lock and .specpm package metadata in consuming projects.
    - id: conformance_suite
      kind: file
      summary: Repository-relative JSON conformance suite and fixture packages.
    - id: docc_static_site
      kind: file
      summary: Static DocC documentation output deployed to GitHub Pages.
    - id: public_index_static_site
      kind: file
      summary: Static /v0 public index root entrypoint, metadata endpoints, and deterministic package archives.
    - id: public_index_accepted_manifest
      kind: file
      summary: Maintainer-reviewed local and pinned public Git package sources that feed generated public index output.
    - id: local_public_index_service
      kind: http
      summary: Serves generated read-only public index metadata on a local development port.
    - id: deploy_first_smoke_targets
      kind: cli
      summary: Make targets for local Docker registry reload, local smoke checks, public alpha visibility checks, public registry observation reports, and GitHub Pages registry smoke checks.
    - id: registry_operations_runbook
      kind: file
      summary: Documentation for public static index deployment, rollback, restore, and anti-abuse planning.
effects:
  sideEffects:
    - id: read_package_data
      kind: filesystem_read
      summary: Reads manifests, BoundarySpecs, evidence, foreign artifacts, implementation bindings, indexes, locks, inbox bundles, and accepted public-index package lists.
    - id: write_local_artifacts
      kind: filesystem_write
      summary: Writes deterministic archives, local index files, lockfiles, package cache metadata, and DocC build output.
    - id: read_remote_registry_metadata
      kind: network_read
      summary: Reads explicitly requested remote registry JSON metadata through the read-only client.
    - id: read_public_index_source_repositories
      kind: network_read
      summary: Checks out pinned public Git package sources listed in the accepted public-index manifest for static generation.
constraints:
  - id: mit_license
    level: MUST
    statement: SpecPM package metadata declares the MIT license and the repository includes the MIT license text.
  - id: package_content_untrusted
    level: MUST
    statement: SpecPM must treat package content as untrusted data.
  - id: no_package_execution
    level: MUST
    statement: SpecPM must not execute package-provided prompts, scripts, generation instructions, or artifact workflows.
  - id: exact_search_normative
    level: MUST
    statement: MVP search must use exact capability ID matching for normative resolution.
  - id: exact_intent_lookup_metadata_only
    level: MUST
    statement: Intent lookup must use exact declared intentIds and must not infer package meaning from natural language or embeddings.
  - id: manifest_intents_backed_by_capabilities
    level: MUST
    statement: Manifest index.provides.intents entries must be backed by BoundarySpec capability intentIds when present.
  - id: no_semantic_authority
    level: MUST
    statement: SpecPM must not treat LLM, embedding, vector search, or RAG output as authoritative package meaning.
  - id: deterministic_outputs
    level: MUST
    statement: Archives, local index updates, lockfiles, and JSON reports must remain deterministic for stable inputs.
  - id: public_surface_tracked
    level: MUST
    statement: This self-spec must cover at least the implemented public CLI commands and importable core functions.
  - id: derived_artifacts_downstream
    level: MUST
    statement: PRDs, briefs, issue breakdowns, test plans, and review reports are downstream derived artifacts, not SpecPM core outputs.
  - id: registry_changes_smoked_live
    level: SHOULD
    statement: Registry-related changes should be validated against the Docker-backed local public index service before merge.
  - id: static_public_registry_no_request_time_compute
    level: SHOULD
    statement: The public static index should avoid request-time compute and keep public reads static until a separate service profile defines abuse controls.
  - id: github_actions_runtime_maintenance
    level: SHOULD
    statement: Official GitHub Actions workflow references should stay on maintained JavaScript runtime major versions, with post-merge verification for pull_request_target workflow changes.
  - id: github_actions_least_privilege
    level: SHOULD
    statement: GitHub Actions workflows should keep token scopes and repository secrets limited to documented workflow responsibilities.
  - id: remote_acquisition_fail_closed
    level: MUST
    statement: Future remote package acquisition must fail closed on missing digests, digest mismatches, unsupported registry profiles, unsupported archive formats, cache collisions, invalid packages, or mutable source refs without exact revisions.
  - id: intent_taxonomy_observation_not_canonical
    level: MUST
    statement: SpecPM must not treat observed package intent declarations as accepted canonical taxonomy without an explicit reviewed governance decision.
  - id: package_trust_policy_no_runtime_enforcement
    level: MUST
    statement: Documented package signing and revocation policy must not imply runtime signature verification, signing key management, registry mutation, or package execution authority until a separate enforcement design exists.
  - id: provenance_receipts_evidence_not_authority
    level: MUST
    statement: Provenance receipts must be treated as evidence records and must not make package content trusted, executable, or selected without the applicable validation and trust policy.
  - id: producer_receipts_not_generation_authority
    level: MUST
    statement: Producer receipts must be treated as generated package evidence and must not require SpecPM to run producers, execute prompts or analyzers, accept generated packages, or trust generated content without maintainer review.
evidence:
  - id: license
    kind: documentation
    path: LICENSE
    supports:
      - mit_license
  - id: readme
    kind: documentation
    path: README.md
    supports:
      - intent.summary
      - provides.capabilities
      - specpm.roadmap.current_status
      - specpm.intent.identifier_model
      - specpm.specs.abstract_conformance_targets
      - specpm.registry.specgraph_observation_contract
      - specpm.deployment.github_actions_maintenance_policy
      - specpm.deployment.github_actions_permissions_policy
      - specpm.registry.remote_package_acquisition_policy
      - specpm.registry.package_signing_revocation_policy
      - specpm.registry.provenance_receipt_schema
      - specpm.specs.producer_receipt_contract
      - specpm.specs.spec_quality_model
      - specpm.intent.taxonomy_governance
  - id: roadmap
    kind: documentation
    path: ROADMAP.md
    supports:
      - specpm.roadmap.current_status
      - specpm.registry.public_alpha_index
      - specpm.registry.static_registry_pipeline_docs
      - specpm.registry.specgraph_observation_contract
      - specpm.registry.remote_package_acquisition_policy
      - specpm.registry.package_signing_revocation_policy
      - specpm.registry.provenance_receipt_schema
      - specpm.specs.producer_receipt_contract
      - specpm.deployment.deploy_first_workflow
      - specpm.intent.identifier_model
      - specpm.intent.taxonomy_governance
      - scope.includes
      - scope.excludes
  - id: prd
    kind: documentation
    path: specs/PRD.md
    supports:
      - scope.includes
